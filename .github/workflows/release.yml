name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: '要构建的 Tag（例如 v1.0.0），不填则使用当前最新 tag'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools musl-dev

      - name: Install OpenSSL (static)
        run: |
          curl -LO https://www.openssl.org/source/openssl-3.4.1.tar.gz
          tar xf openssl-3.4.1.tar.gz
          cd openssl-3.4.1
          ./Configure linux-x86_64 no-shared no-dso -fPIC --prefix=/usr/local/musl
          make -j$(nproc)
          sudo make install
          cd .. && rm -rf openssl-3.4.1 openssl-3.4.1.tar.gz

      - name: Build
        env:
          CC: musl-gcc
          OPENSSL_STATIC: "1"
          OPENSSL_DIR: /usr/local/musl
          OPENSSL_INCLUDE_DIR: /usr/local/musl/include
          OPENSSL_LIB_DIR: /usr/local/musl/lib64
          RUSTFLAGS: -C target-feature=+crt-static
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/x86_64-unknown-linux-musl/release/floatctf
