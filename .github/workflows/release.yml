name: Release

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      tag:
        description: "要构建的 Tag（例如 v1.0.0）"
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        env:
          CC: musl-gcc
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: |
          RUSTC_WRAPPER="" cargo build \
            --release \
            --target x86_64-unknown-linux-musl

      - name: Strip binary
        run: |
          strip target/x86_64-unknown-linux-musl/release/floatctf

      - name: Verify static binary
        run: |
          file target/x86_64-unknown-linux-musl/release/floatctf
          ldd target/x86_64-unknown-linux-musl/release/floatctf || true

      - name: Rename artifact
        run: |
          mkdir dist
          cp target/x86_64-unknown-linux-musl/release/floatctf \
             dist/floatctf-linux-amd64-musl

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
