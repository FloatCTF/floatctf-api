[package]
name = "floatctf"
version = "0.1.0"
edition = "2024"

[dependencies]
cm = { path = "./cm" }

actix-web = "4"
sea-orm = { version = "1.1.0", features = [
    "macros",
    "with-chrono",
    "sqlx-postgres",
    "runtime-tokio-native-tls",
] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["serde", "v4"] }
dotenvy = "0.15"

anyhow = "1"
thiserror = "2"

argon2 = "0.5"
